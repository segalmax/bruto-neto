<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחשבון ברוטו-נטו ישראל</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    height: 100vh;
    overflow: hidden;
    padding: 12px;
  }
  .layout {
    display: grid;
    grid-template-columns: 480px 1fr 280px;
    grid-template-rows: 100%;
    gap: 12px;
    height: 100%;
    max-width: 1600px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  /* Sidebar */
  .controls-card {
    padding: 12px;
    overflow-y: auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .sidebar-title {
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: #1a1a2e;
    padding-bottom: 10px;
    margin-bottom: 10px;
    border-bottom: 2px solid #e8edf7;
    text-align: center;
  }
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    align-items: start;
  }
  .section-card {
    background: #fbfcff;
    border: 1px solid #e8edf7;
    border-radius: 10px;
    padding: 10px;
  }
  .section-title {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #888;
    margin: 12px 0 7px;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 4px;
  }
  .section-title:first-child { margin-top: 0; }
  .field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    gap: 6px;
  }
  label {
    font-size: 0.8rem;
    color: #444;
    white-space: nowrap;
    flex-shrink: 0;
  }
  input[type="number"], select {
    border: 1.5px solid #e0e0e0;
    border-radius: 7px;
    padding: 4px 8px;
    font-size: 0.82rem;
    width: 90px;
    text-align: left;
    direction: ltr;
    background: #fafafa;
    transition: border-color 0.15s;
    outline: none;
  }
  input[type="number"]:focus, select:focus { border-color: #4a6cf7; background: #fff; }
  select { width: 100px; text-align: right; direction: rtl; }

  /* Chart column */
  .chart-card { display: flex; flex-direction: column; gap: 0; height: 100%; overflow: hidden; }
  #chart-container { flex: 1; position: relative; min-height: 0; }
  .chart-range-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    font-size: 0.82rem; color: #6b7280;
    padding: 4px 4px 6px;
    flex-shrink: 0;
  }
  .chart-hint {
    display: flex; align-items: center; gap: 6px;
    background: #eff6ff; color: #3b82f6;
    padding: 4px 10px; border-radius: 999px;
    font-size: 0.72rem; font-weight: 700;
    animation: pulse-subtle 2s infinite;
  }
  @keyframes pulse-subtle {
    0% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
    100% { opacity: 0.8; transform: scale(1); }
  }
  canvas#chart { cursor: crosshair; }
  .chart-range-label { font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.6px; margin-left: 4px; }
  .chart-range-bar label { display: flex; align-items: center; gap: 6px; }
  .chart-range-bar input { width: 90px; border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 4px 8px; font-size: 0.82rem; direction: ltr; text-align: left; }
  
  canvas { display: block; }

  /* Middle column: hover details panel */
  .hover-panel {
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
    overflow-y: auto;
    height: 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    padding: 0;
  }
  .hover-header {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px;
    background: #1a1a2e;
    color: #fff;
    border-bottom: 1px solid #2d2d44;
  }
  .hover-metric { display: grid; gap: 4px; text-align: center; }
  .hover-metric-label { font-size: 0.65rem; color: #9ca3af; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
  .hover-metric-value { font-size: 1.1rem; font-weight: 800; }
  .hover-metric-sub { font-size: 0.65rem; color: #6b7280; margin-top: 2px; }

  .hover-groups {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }
  .hover-group {
    padding: 14px 16px;
    border-left: 1px solid #e5e7eb;
  }
  .hover-group:last-child { border-left: none; }
  .hover-group-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb;
  }
  .hover-group-name { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #6b7280; }
  .hover-group-total { font-size: 0.9rem; font-weight: 700; color: #1a1a2e; font-variant-numeric: tabular-nums; }
  .hover-group-total span { font-size: 0.75rem; font-weight: 400; color: #6b7280; margin-left: 5px; }
  .hover-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 0.83rem; cursor: pointer; transition: background 0.15s; }
  .hover-row-label { color: #444; display: flex; align-items: center; gap: 6px; }
  .hover-row-value { color: #1a1a2e; font-variant-numeric: tabular-nums; direction: ltr; }
  .hover-row-value .pct { font-size: 0.75rem; color: #6b7280; margin-right: 5px; }
  .hover-row.negative .hover-row-value { color: #ef4444; }

  /* Breakdown Ribbon */
  .breakdown-container {
    padding: 16px 16px 20px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
  }
  .breakdown-title {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: #9ca3af; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .breakdown-bar-outer {
    height: 36px; background: #f3f4f6; border-radius: 10px;
    position: relative; display: flex; overflow: visible;
    margin-bottom: 24px;
    border: 1px solid #e5e7eb;
  }
  .breakdown-segment { cursor: pointer; }
  .breakdown-segment.active { box-shadow: inset 0 0 0 2px #1a1a2e; z-index: 2; }
  .breakdown-segment.employer.active { box-shadow: 0 0 0 3px #10b981; z-index: 3; border-color: #10b981; }
  .hover-row.active { background: rgba(59, 130, 246, 0.12); border-radius: 6px; margin: 0 -6px; padding: 4px 6px; }
  .breakdown-segment {
    height: 100%; position: relative; transition: width 0.3s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .breakdown-segment:first-child { border-top-right-radius: 9px; border-bottom-right-radius: 9px; }
  
  .breakdown-bar-wrapper { position: relative; }
  /* "Mine" bracket indicator - below the bar, spans employer + mine segments */
  .mine-bracket {
    position: absolute;
    bottom: -10px;
    height: 6px;
    border: 2px solid #3b82f6;
    border-top: none;
    border-radius: 0 0 8px 8px;
    display: flex;
    justify-content: center;
  }
  .mine-bracket-label {
    position: absolute;
    bottom: -18px;
    font-size: 0.65rem;
    font-weight: 800;
    color: #3b82f6;
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* Employer segments: inside the bar but visually distinct */
  .breakdown-segment.employer {
    opacity: 0.7;
    border-right: 2px dashed rgba(255,255,255,0.6);
    border-left: 2px dashed rgba(255,255,255,0.6);
  }
  .breakdown-segment:last-child { border-top-left-radius: 9px; border-bottom-left-radius: 9px; }
  /* 100% bruto marker — positioned dynamically between employer extras and taxes */
  .bruto-marker {
    position: absolute; top: -8px; bottom: -8px;
    width: 2px; background: #1a1a2e; z-index: 10;
  }
  .bruto-marker-label {
    position: absolute; bottom: 100%; right: 0; transform: translateX(50%);
    font-size: 0.65rem; font-weight: 800; color: #1a1a2e; margin-bottom: 4px;
  }

  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    display: inline-block;
    margin-left: 8px;
    vertical-align: middle;
  }
  @media (max-width: 1100px) {
    body { height: auto; overflow: auto; padding: 12px; }
    .layout { grid-template-columns: 1fr; grid-template-rows: auto; height: auto; gap: 12px; }
    .controls-card { height: auto; overflow-y: visible; }
    .chart-card { height: 340px; overflow: visible; }
    #chart-container { flex: 1; min-height: 0; }
    .hover-panel { height: auto; overflow-y: visible; }
    .hover-header { grid-template-columns: repeat(2, 1fr); }
    .hover-groups { grid-template-columns: 1fr; }
    .hover-group { border-left: none; border-top: 1px solid #e5e7eb; }
  }
</style>
</head>
<body>
<div class="layout">
  <div class="card chart-card">
    <div class="chart-range-bar">
      <div style="display:flex; align-items:center; gap:16px;">
        <span class="chart-range-label">טווח גרף</span>
        <label>מ־<input type="number" id="rangeMin" value="5000" min="0" step="1000"> ₪</label>
        <label>עד <input type="number" id="rangeMax" value="70000" min="10000" step="100000"> ₪</label>
      </div>
      <div class="chart-hint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        לחצו או גררו על הגרף לסימולציה
      </div>
    </div>
    <div id="chart-container"><canvas id="chart"></canvas></div>
  </div>

  <div id="hoverDetails" class="hover-panel card"></div>

  <div class="card controls-card">
    <div class="sidebar-title">מחשבון ברוטו ← נטו</div>
    <div class="controls-grid">
      <div class="section-card">
        <div class="section-title">פרטים אישיים</div>
        <div class="field">
          <label>שכר ברוטו (₪)</label>
          <input type="number" id="bruto" value="20000" min="0" step="500">
        </div>
        <div class="field">
          <label>מצב משפחתי</label>
          <select id="family">
            <option value="single">רווק/ה</option>
            <option value="married">נשוי/אה</option>
          </select>
        </div>
        <div class="field">
          <label>בן/בת זוג עובד/ת</label>
          <select id="spouseWorks">
            <option value="yes">כן</option>
            <option value="no">לא</option>
          </select>
        </div>
        <div class="field">
          <label>נקודות זיכוי</label>
          <input type="number" id="creditPoints" value="2.25" min="0" step="0.25">
        </div>
      </div>
      <div class="section-card">
        <div class="section-title">קרן פנסיה</div>
        <div class="field">
          <label>עובד (%)</label>
          <input type="number" id="pensionEmp" value="6" min="0" max="20" step="0.5">
        </div>
        <div class="field">
          <label>מעביד (%)</label>
          <input type="number" id="pensionEmpl" value="6.5" min="0" max="20" step="0.5">
        </div>
        <div class="field">
          <label>פיצויים מעביד (%)</label>
          <input type="number" id="severance" value="8.33" min="0" max="12" step="0.1">
        </div>
      </div>
      <div class="section-card">
        <div class="section-title">קרן השתלמות</div>
        <div class="field">
          <label>עובד (%)</label>
          <input type="number" id="studyEmp" value="2.5" min="0" max="10" step="0.5">
        </div>
        <div class="field">
          <label>מעביד (%)</label>
          <input type="number" id="studyEmpl" value="7.5" min="0" max="15" step="0.5">
        </div>
        <div class="section-title">ביטוחים</div>
        <div class="field">
          <label>אובדן כושר מעביד (%)</label>
          <input type="number" id="disability" value="1" min="0" max="5" step="0.1">
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
