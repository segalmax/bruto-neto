<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחשבון ברוטו-נטו ישראל</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    height: 100vh;
    overflow: hidden;
    padding: 12px;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: 100%;
    gap: 12px;
    height: 100%;
    max-width: 1600px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  /* Sidebar */
  .controls-card {
    padding: 12px;
    overflow-y: auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .sidebar-title {
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: #1a1a2e;
    padding-bottom: 10px;
    margin-bottom: 10px;
    border-bottom: 2px solid #e8edf7;
    text-align: center;
  }
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    align-items: start;
  }
  .section-card {
    background: #fbfcff;
    border: 1px solid #e8edf7;
    border-radius: 10px;
    padding: 10px;
  }
  .section-title {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #888;
    margin: 12px 0 7px;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 4px;
  }
  .section-title:first-child { margin-top: 0; }
  .field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    gap: 6px;
  }
  label {
    font-size: 0.8rem;
    color: #444;
    white-space: nowrap;
    flex-shrink: 0;
  }
  input[type="number"], select {
    border: 1.5px solid #e0e0e0;
    border-radius: 7px;
    padding: 4px 8px;
    font-size: 0.82rem;
    width: 90px;
    text-align: left;
    direction: ltr;
    background: #fafafa;
    transition: border-color 0.15s;
    outline: none;
  }
  input[type="number"]:focus, select:focus { border-color: #4a6cf7; background: #fff; }
  select { width: 100px; text-align: right; direction: rtl; }

  /* Main column */
  .chart-card { display: flex; flex-direction: column; gap: 0; height: 100%; overflow: hidden; }
  .chart-range-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    font-size: 0.82rem; color: #6b7280;
    padding: 4px 4px 6px;
    flex-shrink: 0;
  }
  .chart-hint {
    display: flex; align-items: center; gap: 6px;
    background: #eff6ff; color: #3b82f6;
    padding: 4px 10px; border-radius: 999px;
    font-size: 0.72rem; font-weight: 700;
    animation: pulse-subtle 2s infinite;
  }
  @keyframes pulse-subtle {
    0% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
    100% { opacity: 0.8; transform: scale(1); }
  }
  canvas#chart { cursor: crosshair; }
  .chart-range-label { font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.6px; margin-left: 4px; }
  .chart-range-bar label { display: flex; align-items: center; gap: 6px; }
  .chart-range-bar input { width: 90px; border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 4px 8px; font-size: 0.82rem; direction: ltr; text-align: left; }
  
  canvas { width: 100% !important; flex-shrink: 0; height: 280px !important; max-height: 340px; }

  .hover-panel {
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
    overflow-y: auto;
    flex: 1;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }
  .hover-header {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px;
    background: #1a1a2e;
    color: #fff;
    border-bottom: 1px solid #2d2d44;
  }
  .hover-metric { display: grid; gap: 4px; text-align: center; }
  .hover-metric-label { font-size: 0.65rem; color: #9ca3af; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
  .hover-metric-value { font-size: 1.1rem; font-weight: 800; }
  .hover-metric-sub { font-size: 0.65rem; color: #6b7280; margin-top: 2px; }

  .hover-groups {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }
  .hover-group {
    padding: 14px 16px;
    border-left: 1px solid #e5e7eb;
  }
  .hover-group:last-child { border-left: none; }
  .hover-group-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb;
  }
  .hover-group-name { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #6b7280; }
  .hover-group-total { font-size: 0.9rem; font-weight: 700; color: #1a1a2e; font-variant-numeric: tabular-nums; }
  .hover-group-total span { font-size: 0.75rem; font-weight: 400; color: #6b7280; margin-left: 5px; }
  .hover-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 0.83rem; cursor: pointer; transition: background 0.15s; }
  .hover-row-label { color: #444; display: flex; align-items: center; gap: 6px; }
  .hover-row-value { color: #1a1a2e; font-variant-numeric: tabular-nums; direction: ltr; }
  .hover-row-value .pct { font-size: 0.75rem; color: #6b7280; margin-right: 5px; }
  .hover-row.negative .hover-row-value { color: #ef4444; }

  /* Breakdown Ribbon */
  .breakdown-container {
    padding: 16px 16px 20px;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
  }
  .breakdown-title {
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: #9ca3af; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .breakdown-bar-outer {
    height: 36px; background: #f3f4f6; border-radius: 10px;
    position: relative; display: flex; overflow: visible;
    margin-bottom: 24px;
    border: 1px solid #e5e7eb;
  }
  .breakdown-segment { cursor: pointer; }
  .breakdown-segment.active { box-shadow: inset 0 0 0 2px #1a1a2e; z-index: 2; }
  .breakdown-segment.employer.active { box-shadow: 0 0 0 3px #10b981; z-index: 3; border-color: #10b981; }
  .hover-row.active { background: rgba(59, 130, 246, 0.12); border-radius: 6px; margin: 0 -6px; padding: 4px 6px; }
  .breakdown-segment {
    height: 100%; position: relative; transition: width 0.3s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .breakdown-segment:first-child { border-top-right-radius: 9px; border-bottom-right-radius: 9px; }
  
  .breakdown-bar-wrapper { position: relative; }
  /* "Mine" bracket indicator - below the bar, spans employer + mine segments */
  .mine-bracket {
    position: absolute;
    bottom: -10px;
    height: 6px;
    border: 2px solid #3b82f6;
    border-top: none;
    border-radius: 0 0 8px 8px;
    display: flex;
    justify-content: center;
  }
  .mine-bracket-label {
    position: absolute;
    bottom: -18px;
    font-size: 0.65rem;
    font-weight: 800;
    color: #3b82f6;
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* Employer segments: inside the bar but visually distinct */
  .breakdown-segment.employer {
    opacity: 0.7;
    border-right: 2px dashed rgba(255,255,255,0.6);
    border-left: 2px dashed rgba(255,255,255,0.6);
  }
  .breakdown-segment:last-child { border-top-left-radius: 9px; border-bottom-left-radius: 9px; }
  /* 100% bruto marker — positioned dynamically between employer extras and taxes */
  .bruto-marker {
    position: absolute; top: -8px; bottom: -8px;
    width: 2px; background: #1a1a2e; z-index: 10;
  }
  .bruto-marker-label {
    position: absolute; bottom: 100%; right: 0; transform: translateX(50%);
    font-size: 0.65rem; font-weight: 800; color: #1a1a2e; margin-bottom: 4px;
  }

  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    display: inline-block;
    margin-left: 8px;
    vertical-align: middle;
  }
  @media (max-width: 900px) {
    body { height: auto; overflow: auto; padding: 12px; }
    .layout { grid-template-columns: 1fr; grid-template-rows: auto; height: auto; }
    .controls-card { height: auto; overflow-y: visible; }
    .chart-card { height: auto; overflow: visible; }
    .hover-header { grid-template-columns: repeat(2, 1fr); }
    .hover-groups { grid-template-columns: 1fr; }
    .hover-group { border-left: none; border-top: 1px solid #e5e7eb; }
  }
</style>
</head>
<body>
<div class="layout">
  <div class="card chart-card">
    <div class="chart-range-bar">
      <div style="display:flex; align-items:center; gap:16px;">
        <span class="chart-range-label">טווח גרף</span>
        <label>מ־<input type="number" id="rangeMin" value="5000" min="0" step="1000"> ₪</label>
        <label>עד <input type="number" id="rangeMax" value="70000" min="10000" step="100000"> ₪</label>
      </div>
      <div class="chart-hint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        לחצו או גררו על הגרף לסימולציה
      </div>
    </div>
    <canvas id="chart"></canvas>
    <div id="hoverDetails" class="hover-panel"></div>
  </div>

  <div class="card controls-card">
    <div class="sidebar-title">מחשבון ברוטו ← נטו</div>
    <div class="controls-grid">
      <div class="section-card">
        <div class="section-title">פרטים אישיים</div>
        <div class="field">
          <label>שכר ברוטו (₪)</label>
          <input type="number" id="bruto" value="20000" min="0" step="500">
        </div>
        <div class="field">
          <label>מצב משפחתי</label>
          <select id="family">
            <option value="single">רווק/ה</option>
            <option value="married">נשוי/אה</option>
          </select>
        </div>
        <div class="field">
          <label>בן/בת זוג עובד/ת</label>
          <select id="spouseWorks">
            <option value="yes">כן</option>
            <option value="no">לא</option>
          </select>
        </div>
        <div class="field">
          <label>נקודות זיכוי</label>
          <input type="number" id="creditPoints" value="2.25" min="0" step="0.25">
        </div>
      </div>
      <div class="section-card">
        <div class="section-title">קרן פנסיה</div>
        <div class="field">
          <label>עובד (%)</label>
          <input type="number" id="pensionEmp" value="6" min="0" max="20" step="0.5">
        </div>
        <div class="field">
          <label>מעביד (%)</label>
          <input type="number" id="pensionEmpl" value="6.5" min="0" max="20" step="0.5">
        </div>
        <div class="field">
          <label>פיצויים מעביד (%)</label>
          <input type="number" id="severance" value="8.33" min="0" max="12" step="0.1">
        </div>
      </div>
      <div class="section-card">
        <div class="section-title">קרן השתלמות</div>
        <div class="field">
          <label>עובד (%)</label>
          <input type="number" id="studyEmp" value="2.5" min="0" max="10" step="0.5">
        </div>
        <div class="field">
          <label>מעביד (%)</label>
          <input type="number" id="studyEmpl" value="7.5" min="0" max="15" step="0.5">
        </div>
        <div class="section-title">ביטוחים</div>
        <div class="field">
          <label>אובדן כושר מעביד (%)</label>
          <input type="number" id="disability" value="1" min="0" max="5" step="0.1">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Tax/insurance rules aligned to provided 2025 tables ──────────────────────
// 2026 tax brackets (verified against mas.gov.il מחשב שכר)
const BRACKETS = [
  { up: 7010,     rate: 0.10 },
  { up: 10060,    rate: 0.14 },
  { up: 16150,    rate: 0.20 },
  { up: 21400,    rate: 0.31 },
  { up: 49017,    rate: 0.35 },
  { up: 60130,    rate: 0.47 },
  { up: Infinity, rate: 0.50 },
];
const CREDIT_POINT_VALUE        = 242;   // NIS per credit point per month (2026)
const BL_THRESHOLD              = 7703;  // 60% of average wage (2026)
const BL_CEILING                = 51910; // max insurable income for BL/health (2026)
const BL_LOW_EMP_RATE           = 0.0104;
const BL_HIGH_EMP_RATE          = 0.07;
const BL_LOW_EMPL_RATE          = 0.0355; // employer BL rate (2026)
const BL_HIGH_EMPL_RATE         = 0.076;  // employer BL rate (2026)
const HEALTH_LOW_RATE           = 0.0323;
const HEALTH_HIGH_RATE          = 0.0517;
const STUDY_FUND_SALARY_CEILING = 15712; // employer study-fund tax-exempt salary ceiling
const PENSION_DISABILITY_CEILING = 34423; // combined employer pension+disability tax-exempt ceiling (2026)
const SEVERANCE_CEILING         = 45618.25; // employer severance tax-exempt salary ceiling (2026)

// ── Pure calculation functions ────────────────────────────────────────────────

function getMarginalBracket(taxableGross) {
  for (const { up, rate } of BRACKETS) {
    if (taxableGross <= up) return Math.round(rate * 100) + '%';
  }
  return '50%';
}

function calcTax(taxableGross, creditPoints) {
  let tax = 0, prev = 0;
  for (const { up, rate } of BRACKETS) {
    if (taxableGross <= prev) break;
    tax += (Math.min(taxableGross, up) - prev) * rate;
    prev = up;
  }
  const credit = creditPoints * CREDIT_POINT_VALUE;
  return Math.max(0, tax - credit);
}

function calcBituachLeumi(insurableGross) {
  const insurable = Math.min(insurableGross, BL_CEILING);
  const low = Math.min(insurable, BL_THRESHOLD);
  const high = Math.max(0, insurable - BL_THRESHOLD);
  const employee = low * BL_LOW_EMP_RATE + high * BL_HIGH_EMP_RATE;
  const employer = low * BL_LOW_EMPL_RATE + high * BL_HIGH_EMPL_RATE;
  return { employee, employer };
}

function calcHealth(insurableGross) {
  const insurable = Math.min(insurableGross, BL_CEILING);
  const low = Math.min(insurable, BL_THRESHOLD);
  const high = Math.max(0, insurable - BL_THRESHOLD);
  return low * HEALTH_LOW_RATE + high * HEALTH_HIGH_RATE;
}

function calcPension(gross, empPct, emplPct) {
  const employee     = gross * (empPct  / 100);
  const employer     = gross * (emplPct / 100);
  const taxableBenefit = Math.max(0, gross - PENSION_DISABILITY_CEILING) * (emplPct / 100);
  return { employee, employer, taxableBenefit };
}

// employer disability contribution above the shared pension/disability ceiling is also taxable
function calcDisabilityTaxableBenefit(gross, disabilityPct) {
  return Math.max(0, gross - PENSION_DISABILITY_CEILING) * (disabilityPct / 100);
}

function calcSeveranceTaxableBenefit(gross, sevrPct) {
  return Math.max(0, gross - SEVERANCE_CEILING) * (sevrPct / 100);
}

function calcStudyFund(gross, empPct, emplPct) {
  const employee       = gross * (empPct  / 100);
  const employer       = gross * (emplPct / 100);
  const taxableBenefit = Math.max(0, gross - STUDY_FUND_SALARY_CEILING) * (emplPct / 100);
  return { employee, employer, taxableBenefit };
}

function calcNeto(bruto, s) {
  const pension  = calcPension(bruto, s.pensionEmp, s.pensionEmpl);
  const study    = calcStudyFund(bruto, s.studyEmp, s.studyEmpl);
  const sevrTaxable       = calcSeveranceTaxableBenefit(bruto, s.sevrEmpl);
  const sevrEmployer      = bruto * (s.sevrEmpl / 100);
  const disabilityTaxable = calcDisabilityTaxableBenefit(bruto, s.disability);
  const disabilityEmployer = bruto * (s.disability / 100);

  const taxableGross = bruto + pension.taxableBenefit + disabilityTaxable + study.taxableBenefit + sevrTaxable;

  const bl        = calcBituachLeumi(taxableGross);
  const health    = calcHealth(taxableGross);
  const incomeTax = calcTax(taxableGross, s.creditPoints);

  // extra tax/BL/health caused by employer taxable benefits (phantom income above ceilings)
  const blBruto        = calcBituachLeumi(bruto);
  const healthBruto    = calcHealth(bruto);
  const incomeTaxBruto = calcTax(bruto, s.creditPoints);
  const extraTax       = (incomeTax - incomeTaxBruto) + (bl.employee - blBruto.employee) + (health - healthBruto);

  const totalDeductions = incomeTax + bl.employee + health + pension.employee + study.employee;
  const neto            = bruto - totalDeductions;

  // Total employer cost = bruto + all employer-paid benefits + employer BL
  const totalCost = bruto + pension.employer + study.employer + sevrEmployer + disabilityEmployer + bl.employer;

  return {
    neto, incomeTax, bl: bl.employee, health, taxableGross, extraTax,
    pension:      pension.employee,
    study:        study.employee,
    pensionEmpl:  pension.employer,
    studyEmpl:    study.employer,
    totalCost
  };
}

// ── Light math tests (manual trigger via console: runMathTests()) ───────────────────────────────
(function () {
  function buildTestSettings() {
    return {
      creditPoints: 2.25,
      pensionEmp: 6,
      pensionEmpl: 6.5,
      sevrEmpl: 8.33,
      studyEmp: 2.5,
      studyEmpl: 7.5,
      disability: 1,
      rangeMin: 0,
      rangeMax: 100000,
      bruto: 0,
    };
  }

  function assertApprox(label, actual, expected, tol) {
    if (Math.abs(actual - expected) > tol) {
      throw new Error(`${label} expected ${expected}, got ${actual}`);
    }
  }

  function runMathTests() {
    const s = buildTestSettings();
    const cases = [
      { bruto: 20000, expected: { neto: 13340.70, incomeTax: 3094.70, bl: 963.41, health: 901.19 } },
      { bruto: 47000, expected: { neto: 23731.95, incomeTax: 13747.30, bl: 3069.25, health: 2456.50 } },
      { bruto: 700000, expected: { neto: 218663.09, incomeTax: 416128.00, bl: 3174.60, health: 2534.31 } },
    ];
    const tol = 0.2;
    cases.forEach(test => {
      const settings = { ...s, bruto: test.bruto };
      const r = calcNeto(test.bruto, settings);
      assertApprox(`neto @${test.bruto}`, r.neto, test.expected.neto, tol);
      assertApprox(`incomeTax @${test.bruto}`, r.incomeTax, test.expected.incomeTax, tol);
      assertApprox(`bl @${test.bruto}`, r.bl, test.expected.bl, tol);
      assertApprox(`health @${test.bruto}`, r.health, test.expected.health, tol);
    });
    console.log('✅ math tests passed for 20k, 47k, 700k');
  }

  window.runMathTests = runMathTests;
})();
function parseInputs() {
  const v = id => parseFloat(document.getElementById(id).value) || 0;
  const minB = Math.max(0, v('rangeMin') || 5000);
  const maxB = Math.max(minB + 10000, v('rangeMax') || 70000);
  return {
    bruto:        v('bruto'),
    rangeMin:     minB,
    rangeMax:     maxB,
    creditPoints: v('creditPoints'),
    pensionEmp:   v('pensionEmp'),
    pensionEmpl:  v('pensionEmpl'),
    sevrEmpl:     v('severance'),
    studyEmp:     v('studyEmp'),
    studyEmpl:    v('studyEmpl'),
    disability:   v('disability'),
  };
}

// ── Chart ─────────────────────────────────────────────────────────────────────
const COLORS = {
  neto:        '#3b82f6',
  pension:     '#8b5cf6',
  pensionEmpl: '#6d28d9',
  study:       '#10b981',
  studyEmpl:   '#0d9488',
  health:      '#f59e0b',
  bl:          '#f97316',
  incomeTax:   '#ec4899',
  extraTax:    '#ec4899',
};
const LABELS = {
  neto:      'נטו',
  pension:   'פנסיה (עובד)',
  pensionEmpl: 'פנסיה (מעסיק)',
  study:     'קרן השתלמות (עובד)',
  studyEmpl: 'קרן השתלמות (מעסיק)',
  health:    'ביטוח בריאות',
  bl:        'ביטוח לאומי',
  incomeTax: 'מס הכנסה',
};

let chartInstance = null;

function formatCurrency(value) {
  return `₪${Math.round(value).toLocaleString()}`;
}

function getHoverState(bruto, settings) {
  const result = calcNeto(bruto, settings);
  // "mine" = cash + employee savings + employer savings (all goes into my accounts)
  const mine      = result.neto + result.pension + result.study + result.pensionEmpl + result.studyEmpl;
  const mineNoCost = result.neto + result.pension + result.study; // excluding employer (for chart boundary)
  const marginalDelta = Math.max(1, Math.round(bruto * 0.001));
  const next      = calcNeto(bruto + marginalDelta, settings);
  const nextMine  = next.neto + next.pension + next.study + next.pensionEmpl + next.studyEmpl;
  const nextMineNoCost = next.neto + next.pension + next.study;
  return {
    bruto, result, mine, mineNoCost,
    minePct:     bruto > 0 ? (mine / bruto) * 100 : 0,
    marginalNeto: ((next.neto - result.neto) / marginalDelta) * 100,
    marginalMine: ((nextMine - mine) / marginalDelta) * 100,
    marginalMineNoCost: ((nextMineNoCost - mineNoCost) / marginalDelta) * 100,
  };
}

function renderHoverDetails(bruto, settings) {
  const panel = document.getElementById('hoverDetails');
  const state = getHoverState(bruto, settings);
  const pct = v => `${((v / bruto) * 100).toFixed(1)}%`;
  const r = state.result;
  const stateTotal = r.incomeTax + r.bl + r.health;
  const pensionTotal = r.pension + r.pensionEmpl;
  const studyTotal   = r.study   + r.studyEmpl;

  const hrow = (segmentKey, label, value, note = '', negative = false) =>
    `<div class="hover-row${negative ? ' negative' : ''}" data-segment-key="${segmentKey}">
       <span class="hover-row-label"><span class="swatch" style="background:${COLORS[segmentKey] || COLORS[segmentKey.replace('Empl','')]}"></span>${label}</span>
       <span class="hover-row-value"><span class="pct">${pct(Math.abs(value))}</span>${negative ? '-' : ''}${formatCurrency(Math.abs(value))}${note ? ` <span style="font-size:0.72rem;color:#6b7280">${note}</span>` : ''}</span>
     </div>`;
  const group = (name, total, rows) =>
    `<div class="hover-group">
       <div class="hover-group-header">
         <span class="hover-group-name">${name}</span>
         <span class="hover-group-total">${formatCurrency(total)}<span>${pct(Math.abs(total))}</span></span>
       </div>
       ${rows}
     </div>`;

  const mineFromBruto = r.neto + r.pension + r.study + r.pensionEmpl + r.studyEmpl;
  
  const effectiveTaxRate = ((r.incomeTax + r.bl + r.health) / bruto) * 100;
  const savingsRate = ((r.pension + r.study + r.pensionEmpl + r.studyEmpl) / bruto) * 100;
  const costMultiplier = r.totalCost / bruto;

  panel.innerHTML = `
    <div class="hover-header">
      <div class="hover-metric">
        <div class="hover-metric-label">מס אפקטיבי</div>
        <div class="hover-metric-value">${effectiveTaxRate.toFixed(1)}%</div>
        <div class="hover-metric-sub">מכל השכר ברוטו</div>
      </div>
      <div class="hover-metric">
        <div class="hover-metric-label">מס שולי</div>
        <div class="hover-metric-value">${state.marginalNeto.toFixed(1)}%</div>
        <div class="hover-metric-sub">על השקל הבא</div>
      </div>
      <div class="hover-metric">
        <div class="hover-metric-label">שיעור חיסכון</div>
        <div class="hover-metric-value">${savingsRate.toFixed(1)}%</div>
        <div class="hover-metric-sub">פנסיה וקה"ש</div>
      </div>
      <div class="hover-metric highlight" style="background: #2d2d44; border-radius: 8px; padding: 4px;">
        <div class="hover-metric-label" style="color: #9ca3af;">עלות מעביד</div>
        <div class="hover-metric-value">x${costMultiplier.toFixed(2)}</div>
        <div class="hover-metric-sub" style="color: #6b7280;">על כל ₪1 ברוטו</div>
      </div>
    </div>

    <div class="breakdown-container">
      <div class="breakdown-bar-wrapper">
        <div class="breakdown-bar-outer">
          ${(() => {
            const total = bruto + r.pensionEmpl + r.studyEmpl;
            const mine  = r.neto + r.pension + r.study + r.pensionEmpl + r.studyEmpl;
            const pct   = v => `${(v / total) * 100}%`;
            // order (RTL = first is rightmost): interleave employer+employee pairs, then taxes
            const segments = [`studyEmpl`,`study`,`pensionEmpl`,`pension`,`neto`,`health`,`bl`,`incomeTax`].map(k => {
              const val = r[k];
              if (!val || val < 1) return '';
              const color = COLORS[k] || COLORS[k.replace('Empl','')];
              const isEmpl = k.endsWith('Empl');
              return `<div class="breakdown-segment${isEmpl ? ' employer' : ''}" data-segment-key="${k}" style="width:${pct(val)}; background:${color}"></div>`;
            }).join('');
            return `
              <div class="mine-bracket" style="right:0; width:${pct(mine)}"><div class="mine-bracket-label">סה"כ שלי</div></div>
              ${segments}
            `;
          })()}
        </div>
      </div>
    </div>

    <div class="hover-groups">
      ${group('שלי', mineFromBruto,
        hrow('neto',       'נטו (מזומן)',         r.neto) +
        hrow('pension',    'פנסיה עובד',          r.pension) +
        hrow('pensionEmpl','פנסיה מעסיק',          r.pensionEmpl) +
        hrow('study',      'קרן השתלמות עובד',    r.study) +
        hrow('studyEmpl',  'קרן השתלמות מעסיק',   r.studyEmpl)
      )}
      ${group('מסים', stateTotal + Math.max(0, r.extraTax),
        hrow('incomeTax', LABELS.incomeTax, r.incomeTax, `מדרגה ${getMarginalBracket(r.taxableGross)}`) +
        hrow('bl',        LABELS.bl,        r.bl) +
        hrow('health',    LABELS.health,    r.health) +
        (r.extraTax > 0 ? hrow('extraTax', 'מס על הטבות מעסיק', r.extraTax) : '')
      )}
    </div>
  `;
  wireBreakdownHover(panel);
}

function wireBreakdownHover(panel) {
  const setActive = (key, on) => {
    panel.querySelectorAll(`[data-segment-key="${key}"]`).forEach(el => el.classList.toggle('active', on));
  };
  const clearAll = () => {
    panel.querySelectorAll('.breakdown-segment.active, .hover-row.active').forEach(el => el.classList.remove('active'));
  };
  panel.addEventListener('mouseover', e => {
    const key = e.target.closest('[data-segment-key]')?.dataset?.segmentKey;
    if (key) { clearAll(); setActive(key, true); }
  });
  panel.addEventListener('mouseout', e => {
    if (!panel.contains(e.relatedTarget)) clearAll();
  });
}

function buildChartData(settings) {
  const minB = settings.rangeMin;
  const maxB = settings.rangeMax;
  const step = Math.max(500, Math.round((maxB - minB) / 200));
  const labels = [];
  const series = { neto: [], pension: [], study: [], health: [], bl: [], incomeTax: [], mine: [] };

  for (let b = minB; b <= maxB; b += step) {
    labels.push(b);
    const r = calcNeto(b, settings);
    for (const k of Object.keys(series)) series[k].push(Math.round(r[k]));
    series.mine[series.mine.length - 1] = Math.round(r.neto + r.pension + r.study); // chart boundary: employee savings only
  }
  return { labels, series };
}

function buildChart(settings) {
  const { labels, series } = buildChartData(settings);

  const mineLine = {
    label: 'גבול — מתחת: שלי | מעל: מדינה',
    data: series.mine,
    yAxisID: 'yEq',
    borderColor: '#ffffff',
    borderWidth: 3,
    fill: false,
    pointRadius: 0,
    tension: 0.3,
    order: -1,
    borderDash: [],
  };

  const equalityLine = {
    label: 'קו שוויון (ברוטו = נטו)',
    data: labels,
    yAxisID: 'yEq',
    borderColor: '#1a1a2e',
    borderWidth: 1.5,
    borderDash: [6, 4],
    fill: false,
    pointRadius: 0,
    tension: 0,
    order: -1,
  };

  const datasets = [mineLine, equalityLine, ...['neto', 'pension', 'study', 'health', 'bl', 'incomeTax'].map(k => ({
    label: LABELS[k],
    data: series[k],
    backgroundColor: COLORS[k] + 'cc',
    borderColor: COLORS[k],
    borderWidth: 1.5,
    fill: true,
    pointRadius: 0,
    tension: 0.3,
  }))];

  function getFoldMarkers(minB, maxB) {
    const taxMarkers = [
      { bruto: 7010, lines: ['נקודת קיפול', 'מס הכנסה: מעבר מ-10% ל-14%'] },
      { bruto: 10060, lines: ['נקודת קיפול', 'מס הכנסה: מעבר מ-14% ל-20%'] },
      { bruto: 16150, lines: ['נקודת קיפול', 'מס הכנסה: מעבר מ-20% ל-31%'] },
      { bruto: 21400, lines: ['נקודת קיפול', 'מס הכנסה: מעבר מ-31% ל-35%'] },
      { bruto: 49017, lines: ['נקודת קיפול', 'מס הכנסה: מעבר מ-35% ל-47%'] },
      { bruto: 60130, lines: ['נקודת קיפול', 'מס הכנסה: מעבר מ-47% ל-50%'] },
    ];
    const markers = [];

    taxMarkers.filter(m => m.bruto >= minB && m.bruto <= maxB).forEach(m => {
      const r = calcNeto(m.bruto, settings);
      const yBl = r.neto + r.pension + r.study + r.health + r.bl;
      markers.push({ bruto: m.bruto, y: yBl, radius: 4, lines: m.lines });
    });

    [BL_THRESHOLD].filter(b => b >= minB && b <= maxB).forEach(b => {
      const r = calcNeto(b, settings);
      const yStudy = r.neto + r.pension + r.study;
      const yHealth = yStudy + r.health;
      const yBl = yHealth + r.bl;
      const lines = ['נקודת קיפול', 'ביטוח לאומי/בריאות: מעבר לשיעור מלא'];
      markers.push({ bruto: b, y: yHealth, radius: 3, lines });
      markers.push({ bruto: b, y: yBl, radius: 3, lines });
    });

    [BL_CEILING].filter(b => b >= minB && b <= maxB).forEach(b => {
      const r = calcNeto(b, settings);
      const yStudy = r.neto + r.pension + r.study;
      const yHealth = yStudy + r.health;
      const yBl = yHealth + r.bl;
      const lines = ['נקודת קיפול', 'ביטוח לאומי/בריאות: מכאן יש תקרה והקו נשטח'];
      markers.push({ bruto: b, y: yHealth, radius: 3, lines });
      markers.push({ bruto: b, y: yBl, radius: 3, lines });
    });

    return markers;
  }

  // vertical marker plugin
  const markerPlugin = {
    id: 'markerLine',
    afterEvent(chart, args) {
      const minB = settings.rangeMin, maxB = settings.rangeMax;
      const event = args.event;
      if (!event) return;
      const ca = chart.chartArea;
      const yScale = chart.scales.y;
      const toX = b => ca.left + ((b - minB) / (maxB - minB)) * (ca.right - ca.left);
      const toY = v => yScale.getPixelForValue(v);
      const foldMarkers = getFoldMarkers(minB, maxB).map(marker => ({ ...marker, px: toX(marker.bruto), py: toY(marker.y) }));
      let nextHover = null;
      let bestDistance = Infinity;

      foldMarkers.forEach(marker => {
        const distance = Math.hypot(event.x - marker.px, event.y - marker.py);
        if (distance <= 10 && distance < bestDistance) {
          bestDistance = distance;
          nextHover = { x: event.x, y: event.y, lines: marker.lines };
        }
      });

      const changed = JSON.stringify(chart.$foldHover?.lines) !== JSON.stringify(nextHover?.lines);
      chart.$foldHover = nextHover;
      chart.$mouseX = event.x;

      // cursor: ew-resize when near the bruto slider line
      const brutoX = ca.left + ((settings.bruto - minB) / (maxB - minB)) * (ca.right - ca.left);
      const nearSlider = Math.abs(event.x - brutoX) <= 10 && event.y >= ca.top && event.y <= ca.bottom;
      chart.canvas.style.cursor = nextHover ? 'help' : nearSlider ? 'ew-resize' : 'crosshair';

      if (!nextHover) {
        const fallbackBruto = Math.min(Math.max(settings.bruto, minB), maxB);
        renderHoverDetails(fallbackBruto, settings);
      }
      if (changed) args.changed = true;
    },
    afterDraw(chart) {
      const bruto  = settings.bruto;
      const minB   = settings.rangeMin, maxB = settings.rangeMax;
      const ctx    = chart.ctx;
      const ca     = chart.chartArea;
      ctx.save();

      // vertical exploration line when hovering (but not dragging)
      if (chart.$mouseX && chart.$mouseX >= ca.left && chart.$mouseX <= ca.right && !chart.$foldHover) {
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(chart.$mouseX, ca.top);
        ctx.lineTo(chart.$mouseX, ca.bottom);
        ctx.stroke();
      }

      if (bruto >= minB && bruto <= maxB) {
        const frac = (bruto - minB) / (maxB - minB);
        const x = ca.left + frac * (ca.right - ca.left);
        const midY = (ca.top + ca.bottom) / 2;

        // bold solid line with shadow
        ctx.shadowColor = 'rgba(0,0,0,0.25)';
        ctx.shadowBlur = 6;
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(x, ca.top);
        ctx.lineTo(x, ca.bottom);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // pill label at top
        const label = `₪${bruto.toLocaleString()}`;
        ctx.font = 'bold 12px sans-serif';
        const tw = ctx.measureText(label).width;
        const ph = 20, pw = tw + 16, pr = 6;
        const px = Math.min(Math.max(x - pw / 2, ca.left), ca.right - pw);
        const py = ca.top - ph - 4;
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.roundRect(px, py, pw, ph, pr);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.fillText(label, px + 8, py + 14);

        // drag handle circle at midpoint
        ctx.beginPath();
        ctx.arc(x, midY, 9, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 3;
        ctx.stroke();
        // grip lines inside circle
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 1.5;
        [-3, 0, 3].forEach(dx => {
          ctx.beginPath();
          ctx.moveTo(x + dx, midY - 4);
          ctx.lineTo(x + dx, midY + 4);
          ctx.stroke();
        });
      }

      // dots on each boundary line at fold points (no vertical lines)
      const yScale = chart.scales.y;
      const toX = b => ca.left + ((b - minB) / (maxB - minB)) * (ca.right - ca.left);
      const toY = v => yScale.getPixelForValue(v);

      getFoldMarkers(minB, maxB).forEach(marker => {
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(toX(marker.bruto), toY(marker.y), marker.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
      });

      if (chart.$foldHover) {
        const padding = 8;
        const lineHeight = 16;
        const boxX = Math.min(chart.$foldHover.x + 12, ca.right - 240);
        const boxY = Math.max(ca.top + 8, chart.$foldHover.y - 10);
        const boxWidth = 228;
        const boxHeight = chart.$foldHover.lines.length * lineHeight + padding * 2;
        ctx.fillStyle = 'rgba(26, 26, 46, 0.94)';
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 8);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'right';
        ctx.font = '12px sans-serif';
        chart.$foldHover.lines.forEach((line, index) => {
          ctx.fillText(line, boxX + boxWidth - padding, boxY + padding + 12 + index * lineHeight);
        });
      }

      ctx.restore();
    }
  };

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      animation: false,
      layout: { padding: { bottom: 10 } },
      interaction: { mode: 'index', intersect: false },
      onClick: (_event, activeElements) => {
        if (!activeElements.length) return;
        document.getElementById('bruto').value = Math.round(labels[activeElements[0].index]);
        update();
      },
      onHover: (_event, activeElements) => {
        if (chartInstance?.$foldHover) return;
        const fallbackBruto = Math.min(Math.max(settings.bruto, labels[0]), labels[labels.length - 1]);
        const hoveredBruto = activeElements.length ? Number(labels[activeElements[0].index]) : fallbackBruto;
        renderHoverDetails(hoveredBruto, settings);
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
        }
      },
      scales: {
        x: {
          ticks: {
            maxTicksLimit: 10,
            callback: function(v) { return `₪${Number(this.getLabelForValue(v)).toLocaleString()}`; },
          },
          title: { display: true, text: 'שכר ברוטו (₪)', font: { size: 12 } }
        },
        y: {
          stacked: true,
          min: 0, max: settings.rangeMax,
          ticks: { stepSize: Math.round(settings.rangeMax / 10), callback: v => `₪${v.toLocaleString()}` },
          title: { display: true, text: '₪ לחודש', font: { size: 12 } }
        },
        yEq: {
          display: false,
          min: 0, max: settings.rangeMax,
        }
      }
    },
    plugins: [markerPlugin],
  });
  renderHoverDetails(Math.min(Math.max(settings.bruto, labels[0]), labels[labels.length - 1]), settings);
}

let dragWired = false;
function update() {
  const settings = parseInputs();
  buildChart(settings);
  if (!dragWired) { applyChartDrag(chartInstance.canvas); dragWired = true; }
}

// ── Wire inputs ───────────────────────────────────────────────────────────────
document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', update));

// drag-to-select on chart canvas
function applyChartDrag(canvas) {
  let dragging = false;
  const pick = e => {
    const pts = chartInstance.getElementsAtEventForMode(e, 'index', { intersect: false }, true);
    if (!pts.length) return;
    const s = parseInputs();
    const b = Math.round(Number(buildChartData(s).labels[pts[0].index]));
    document.getElementById('bruto').value = b;
    update();
  };
  canvas.addEventListener('mousedown', e => { dragging = true; pick(e); });
  canvas.addEventListener('mousemove', e => { if (dragging) pick(e); });
  document.addEventListener('mouseup', () => { dragging = false; });
}

update();
</script>
